name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx turbo run typecheck
      - run: npx eslint . --max-warnings 0
      - run: npx prettier --check .
      - run: npm audit --omit=dev

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Run coverage for shared, mcp, cli, web via turbo (parallel)
      - run: npx turbo run test:coverage --filter=@chinmeister/shared --filter=chinmeister-mcp --filter=chinmeister --filter=chinmeister-web
      # Worker tests run separately (workerd runtime via @cloudflare/vitest-pool-workers)
      - run: npm run test:worker
      # E2E tests need playwright
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:web
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage/
          retention-days: 3

  deploy:
    name: Deploy
    needs: [check, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Deploy worker
      - run: npx wrangler deploy
        working-directory: packages/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Build and deploy web
      - run: npm run build --workspace=packages/web
      - run: npx wrangler pages deploy dist --project-name=chinmeister
        working-directory: packages/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
