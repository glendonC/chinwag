name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-worker:
    name: Test Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm run test:worker

  test-mcp:
    name: Test MCP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm run test:mcp

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm run test:cli

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm ci --prefix packages/web
      - run: npm run test:web

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm ci --prefix packages/web
      - run: cd packages/cli && npm run build
      - run: npm run build --prefix packages/web
      - run: cd packages/worker && npx wrangler deploy --dry-run
