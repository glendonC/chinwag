name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx eslint .
      - run: npx prettier --check .

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev

  test-worker:
    name: Test Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Worker tests run in the workerd runtime via @cloudflare/vitest-pool-workers.
      # V8 coverage is not supported in workerd (no node:inspector/promises).
      - run: npm run test:worker

  test-shared:
    name: Test Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:shared
      - name: Upload Shared coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: packages/shared/coverage/
          retention-days: 7

  test-mcp:
    name: Test MCP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Coverage thresholds enforced in vitest.config.js — fails if coverage drops below baseline.
      - run: npm run test:coverage:mcp
      - name: Upload MCP coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mcp
          path: packages/mcp/coverage/
          retention-days: 7

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:coverage:cli
      - name: Upload CLI coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cli
          path: packages/cli/coverage/
          retention-days: 7

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:coverage:web
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: packages/web/coverage/
          retention-days: 7

  test-web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:web

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build --workspace=packages/cli
      - run: npm run build --workspace=packages/web
      - run: cd packages/worker && npx wrangler deploy --dry-run
