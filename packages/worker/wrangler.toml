name = "chinmeister-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Scheduled triggers:
#   - "0 3 * * 1" — weekly pulse check (Mon 3am UTC) verifying tool directory
#     freshness: GitHub stars, website uptime.
#   - "0 */6 * * *" — 6-hour model pricing refresh from LiteLLM.
# Every cron must have an explicit case in src/index.ts scheduled() dispatch.
[triggers]
crons = ["0 3 * * 1", "0 */6 * * *"]

# Workers Observability — logs + traces persisted to CF dashboard
# View at: dash.cloudflare.com → Workers & Pages → chinmeister-api → Observability
[observability]
enabled = true

[observability.traces]
enabled = true

[vars]
ENVIRONMENT = "production"
DASHBOARD_URL = "https://chinmeister.com"
MODERATION_MODE = "strict"

[env.local.vars]
ENVIRONMENT = "local"
DASHBOARD_URL = "http://localhost:56790"
MODERATION_MODE = "local_safe"

[env.local.ai]
binding = "AI"

[[env.local.kv_namespaces]]
binding = "AUTH_KV"
id = "794f49e45d904b09ab100f81807dc3c0"

[[env.local.durable_objects.bindings]]
name = "DATABASE"
class_name = "DatabaseDO"

[[env.local.durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[env.local.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[env.local.durable_objects.bindings]]
name = "TEAM"
class_name = "TeamDO"

# Workers AI for content moderation (Llama Guard 3) and tool evaluation
[ai]
binding = "AI"

# Admin key for directory management endpoints (import, delete, promote)
# Set via: npx wrangler secret put ADMIN_KEY

# KV namespace for token-to-user-id auth lookups
[[kv_namespaces]]
binding = "AUTH_KV"
id = "794f49e45d904b09ab100f81807dc3c0"

# Durable Objects
[[durable_objects.bindings]]
name = "DATABASE"
class_name = "DatabaseDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "TEAM"
class_name = "TeamDO"

# DO migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DatabaseDO", "LobbyDO", "RoomDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TeamDO"]

