name = "chinwag-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Workers Observability — logs + traces persisted to CF dashboard
# View at: dash.cloudflare.com → Workers & Pages → chinwag-api → Observability
[observability]
enabled = true

[observability.traces]
enabled = true

[vars]
ENVIRONMENT = "production"
DASHBOARD_URL = "https://chinwag.dev"

# Workers AI for content moderation (Llama Guard 3) and tool evaluation
[ai]
binding = "AI"

# Exa API key for web search in tool evaluation pipeline
# Set via: npx wrangler secret put EXA_API_KEY

# KV namespace for token-to-user-id auth lookups
[[kv_namespaces]]
binding = "AUTH_KV"
id = "794f49e45d904b09ab100f81807dc3c0"

# Durable Objects
[[durable_objects.bindings]]
name = "DATABASE"
class_name = "DatabaseDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "TEAM"
class_name = "TeamDO"

# DO migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DatabaseDO", "LobbyDO", "RoomDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TeamDO"]

