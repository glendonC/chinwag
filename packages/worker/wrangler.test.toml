# Test-only wrangler config — local KV, AI binding without a remote proxy.
# The pool runs with `remoteBindings: false`, so the AI binding is a stub
# that throws "needs to be run remotely". MODERATION_MODE=local_safe lets
# moderation fall back to the blocklist when AI is unreachable, which is
# what we want during route tests; the strict-mode 503 path is covered by
# the dedicated unit tests in moderation.test.ts.
name = "chinmeister-api-test"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "test"
MODERATION_MODE = "local_safe"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "test-kv-local"

[[durable_objects.bindings]]
name = "DATABASE"
class_name = "DatabaseDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "TEAM"
class_name = "TeamDO"

[ai]
binding = "AI"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DatabaseDO", "LobbyDO", "RoomDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TeamDO"]
