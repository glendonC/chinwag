# Test-only wrangler config — local KV, mock AI binding.
# The AI binding provides a local mock so moderation's fail-safe
# doesn't block all content in tests.
name = "chinmeister-api-test"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "test"
MODERATION_MODE = "strict"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "test-kv-local"

[[durable_objects.bindings]]
name = "DATABASE"
class_name = "DatabaseDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "TEAM"
class_name = "TeamDO"

[ai]
binding = "AI"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DatabaseDO", "LobbyDO", "RoomDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TeamDO"]
