<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>chinmeister dashboard</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Newsreader:opsz,wght@6..72,300;6..72,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Resolve theme before first paint to prevent flash
      (function () {
        var p = localStorage.getItem('chinmeister-theme');
        var dark =
          p === 'dark' || (p !== 'light' && matchMedia('(prefers-color-scheme:dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = dark ? '#0e0f11' : '#ffffff';
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
